name: window-watch

on:
  # Scheduling moved to Fly.io (runner.py) — keeping workflow_dispatch for manual one-off runs
  workflow_dispatch:
    inputs:
      daily_summary:
        description: 'Send daily summary instead of state check'
        type: boolean
        default: false

# Avoid overlapping runs
concurrency:
  group: window-watch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      # Carry the last "open/close" state between runs so we only buzz on changes
      - name: Restore state
        uses: actions/cache/restore@v5
        with:
          path: state.json
          key: window-state-${{ github.run_id }}
          restore-keys: window-state-

      - name: Check temperatures
        env:
          LAT: ${{ vars.LAT }}
          LON: ${{ vars.LON }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          CLOSE_ABOVE: ${{ vars.CLOSE_ABOVE }}
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
          SHELLY_AUTH_KEY: ${{ secrets.SHELLY_AUTH_KEY }}
          SHELLY_DEVICE_ID: ${{ secrets.SHELLY_DEVICE_ID }}
          SHELLY_SERVER: ${{ secrets.SHELLY_SERVER }}
          DAILY_SUMMARY: ${{ github.event.schedule == '10 7 * * *' || inputs.daily_summary == true }}
        run: python window_watch.py

      - name: Save state
        if: always()
        uses: actions/cache/save@v5
        with:
          path: state.json
          key: window-state-${{ github.run_id }}
