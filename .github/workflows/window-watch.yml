name: window-watch

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min — state-change alerts
    - cron: "10 7 * * *"     # 8:10am BST (7:10 UTC) — morning forecast brief
  workflow_dispatch:
    inputs:
      daily_summary:
        description: 'Send daily summary instead of state check'
        type: boolean
        default: false

# Avoid overlapping runs
concurrency:
  group: window-watch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      # Carry the last "open/close" state between runs so we only buzz on changes
      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: window-state-${{ github.run_id }}
          restore-keys: window-state-

      - name: Check temperatures
        env:
          LAT: ${{ vars.LAT }}
          LON: ${{ vars.LON }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          CLOSE_ABOVE: ${{ vars.CLOSE_ABOVE }}
          OPEN_BELOW: ${{ vars.OPEN_BELOW }}
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
          DAILY_SUMMARY: ${{ github.event.schedule == '10 7 * * *' || inputs.daily_summary == true }}
        run: python window_watch.py

      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: window-state-${{ github.run_id }}
