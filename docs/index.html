<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Window Watch</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background 0.6s ease, color 0.6s ease;
      padding: 24px;
    }

    body.open    { background: #0f3460; color: #e0f0ff; }
    body.close   { background: #7b1e1e; color: #ffe8e8; }
    body.unknown { background: #1a1a2e; color: #aaa; }

    .card {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .status {
      font-size: clamp(56px, 18vw, 96px);
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .hint {
      font-size: 16px;
      opacity: 0.6;
      margin-bottom: 40px;
    }

    .temp {
      font-size: clamp(40px, 12vw, 64px);
      font-weight: 300;
      letter-spacing: -1px;
      margin-bottom: 4px;
    }

    .temp span { opacity: 0.5; font-size: 0.55em; vertical-align: super; }

    .thresholds {
      font-size: 13px;
      opacity: 0.35;
      margin-bottom: 32px;
    }

    .forecast {
      font-size: 15px;
      opacity: 0.75;
      margin-bottom: 8px;
      padding: 12px 16px;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      line-height: 1.5;
      margin-bottom: 32px;
    }

    .forecast strong { opacity: 1; }
    .forecast.warn { background: rgba(255,200,0,0.12); }

    .updated {
      font-size: 12px;
      opacity: 0.35;
    }

    .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      margin-right: 6px;
      vertical-align: middle;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.9; }
    }
  </style>
</head>
<body class="unknown">
  <div class="card">
    <div class="status" id="status">—</div>
    <div class="hint" id="hint">loading…</div>
    <div class="temp" id="temp">—<span>°C</span></div>
    <div class="thresholds" id="thresholds"></div>
    <div class="forecast" id="forecast" style="display:none"></div>
    <div class="updated"><span class="dot"></span><span id="updated">checking…</span></div>
  </div>

  <script>
    const GIST_API = "https://api.github.com/gists/bd24c63bd7e129c86942db6ed67f9008"

    const COPY = {
      open:    { label: "OPEN",  hint: "let the air through" },
      close:   { label: "CLOSE", hint: "hold the cool in" },
      unknown: { label: "—",     hint: "waiting for data" },
    }

    function fmtHour(h) {
      if (h === 0)  return "midnight"
      if (h < 12)  return `${h}am`
      if (h === 12) return "noon"
      return `${h - 12}pm`
    }

    function timeAgo(utcString) {
      if (!utcString) return "never updated"
      const diff = Math.floor((Date.now() - new Date(utcString).getTime()) / 60000)
      if (diff < 1) return "just now"
      if (diff < 60) return `${diff} min ago`
      return `${Math.floor(diff / 60)}h ago`
    }

    let lastData = null;

    async function load() {
      try {
        const res = await fetch(GIST_API)
        const gist = await res.json()
        lastData = JSON.parse(gist.files["window-watch-status.json"].content)
        updateUI()
      } catch(e) {
        document.getElementById("hint").textContent = "couldn't load data"
      }
    }

    function updateUI() {
      if (!lastData) return
      const d = lastData
      const s = d.status || "unknown"
      const copy = COPY[s] || COPY.unknown

      document.body.className = s
      document.getElementById("status").textContent = copy.label
      document.getElementById("hint").textContent = copy.hint
      document.getElementById("temp").innerHTML = d.outdoor_c != null
        ? `${d.outdoor_c.toFixed(1)}<span>°C outside</span>`
        : `—<span>°C</span>`
      document.getElementById("thresholds").textContent = d.close_above_c != null
        ? `Close above ${d.close_above_c}° · Open below ${d.open_below_c}°`
        : ""

      // Forecast block
      const fc = document.getElementById("forecast")
      if (d.forecast_max_c != null) {
        fc.style.display = ""
        const peak = `peaks at <strong>${d.forecast_max_c.toFixed(0)}°C</strong> around ${fmtHour(d.forecast_peak_hour)}`
        if (d.forecast_close_hour != null) {
          fc.className = "forecast warn"
          fc.innerHTML = `Today ${peak} — close up before <strong>${fmtHour(d.forecast_close_hour)}</strong>`
        } else {
          fc.className = "forecast"
          fc.innerHTML = `Today ${peak} — should stay manageable`
        }
      } else {
        fc.style.display = "none"
      }

      document.getElementById("updated").textContent = timeAgo(d.updated_utc)
    }

    load()
    // Fetch new data every 10 minutes
    setInterval(load, 10 * 60 * 1000)
    // Update the "time ago" string every 60 seconds
    setInterval(updateUI, 60000)
  </script>
</body>
</html>
