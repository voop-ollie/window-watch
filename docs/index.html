<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Window Watch</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background 0.6s ease, color 0.6s ease;
      padding: 24px;
    }

    body.open    { background: #0f3460; color: #e0f0ff; }
    body.close   { background: #7b1e1e; color: #ffe8e8; }
    body.unknown { background: #1a1a2e; color: #aaa; }

    .card {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .status {
      font-size: clamp(56px, 18vw, 96px);
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .hint {
      font-size: 16px;
      opacity: 0.6;
      margin-bottom: 40px;
    }

    .temp {
      font-size: clamp(40px, 12vw, 64px);
      font-weight: 300;
      letter-spacing: -1px;
      margin-bottom: 4px;
    }

    .temp span { opacity: 0.5; font-size: 0.55em; vertical-align: super; }

    .temp-sub {
      font-size: 15px;
      opacity: 0.55;
      margin-bottom: 32px;
    }

    .thresholds {
      font-size: 13px;
      opacity: 0.35;
      margin-bottom: 32px;
    }

    .forecast {
      font-size: 15px;
      opacity: 0.75;
      margin-bottom: 8px;
      padding: 12px 16px;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      line-height: 1.5;
      margin-bottom: 32px;
    }

    .forecast strong { opacity: 1; }
    .forecast.warn { background: rgba(255,200,0,0.12); }
    .forecast-peak { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 13px; opacity: 0.5; }

    .updated {
      font-size: 12px;
      opacity: 0.35;
    }

    .balance { width: 100%; margin-bottom: 32px; }
    .balance-track {
      position: relative; height: 6px; border-radius: 3px;
      background: rgba(255,255,255,0.12); margin: 10px 0 8px;
    }
    .balance-bg-cool {
      position: absolute; left: 0; top: 0; bottom: 0; width: 50%;
      background: rgba(77,182,255,0.25); border-radius: 3px 0 0 3px;
    }
    .balance-bg-warm {
      position: absolute; right: 0; top: 0; bottom: 0; width: 50%;
      background: rgba(255,120,100,0.25); border-radius: 0 3px 3px 0;
    }
    .balance-deadband {
      position: absolute; top: -2px; bottom: -2px; border-radius: 1px;
      background: rgba(255,255,255,0.06);
      border-left: 1px solid rgba(255,255,255,0.12);
      border-right: 1px solid rgba(255,255,255,0.12);
    }
    .balance-needle {
      position: absolute; left: 50%; top: -4px; bottom: -4px; width: 1.5px;
      transform: translateX(-50%); background: rgba(255,255,255,0.45); border-radius: 1px;
    }
    .balance-fill {
      position: absolute; top: 0; bottom: 0; border-radius: 3px;
      transition: left 0.5s ease, width 0.5s ease, background 0.4s ease;
    }
    .balance-ball {
      position: absolute; top: 50%; width: 14px; height: 14px; border-radius: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(0,0,0,0.2);
      transition: left 0.5s ease, background 0.4s ease;
    }
    .balance-labels {
      display: flex; justify-content: space-between;
      font-size: 11px; opacity: 0.35;
    }
    .balance-temps {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; opacity: 0.55;
    }
    .balance-delta { font-size: 12px; opacity: 0.55; }

    .refresh-btn {
      margin-top: 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: inherit;
      font-size: 13px;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.18); }
    .refresh-btn:active { background: rgba(255,255,255,0.08); }
    .refresh-btn:disabled { opacity: 0.4; cursor: default; }
    #checked { margin-left: 8px; opacity: 0.55; }

    .chart-wrap {
      width: 100%;
      height: 160px;
      margin-top: 28px;
      position: relative;
    }

    .wetbulb { width: 100%; margin-top: 32px; }
    .wetbulb-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 8px;
    }
    .wetbulb-title { font-size: 12px; opacity: 0.5; letter-spacing: 0.02em; }
    .wetbulb-value { font-size: 14px; font-weight: 600; }
    .wetbulb-value span { opacity: 0.5; font-weight: 400; }
    .wetbulb-scale {
      position: relative; height: 8px; border-radius: 4px; overflow: hidden;
      /* Colour boundaries align with the comfort-band thresholds on the 18–35°
         wet-bulb scale: comfortable<22 (24%), muggy<26 (47%), caution<28 (59%),
         danger<31 (76%), extreme beyond. */
      background: linear-gradient(to right,
        #3a7bd5 0%,        /* comfortable (≤18) */
        #5cae8e 24%,       /* → muggy boundary (22°) */
        #d9b54a 47%,       /* → caution boundary (26°) */
        #e08a3c 59%,       /* → danger boundary (28°) */
        #d04a3c 76%,       /* → extreme boundary (31°) */
        #7a1f1f 100%);     /* extreme (35°) */
    }
    .wetbulb-marker {
      position: absolute; top: -3px; bottom: -3px; width: 3px;
      transform: translateX(-50%); background: #fff; border-radius: 2px;
      box-shadow: 0 0 0 1.5px rgba(0,0,0,0.45);
      transition: left 0.5s ease;
    }
    .wetbulb-ticks {
      position: relative; height: 14px; margin-top: 4px; font-size: 10px; opacity: 0.35;
    }
    .wetbulb-ticks span { position: absolute; transform: translateX(-50%); white-space: nowrap; }
    .wetbulb-readout { margin-top: 8px; font-size: 13px; opacity: 0.7; text-align: center; }
    .wetbulb-readout.alert { opacity: 1; color: #ffd0d0; font-weight: 600; }
    .wetbulb-forecast {
      margin-top: 10px; padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 12px; opacity: 0.6; text-align: center;
    }
    .wetbulb-forecast strong { opacity: 1; font-weight: 600; }
    .wetbulb-foot { margin-top: 4px; font-size: 10px; opacity: 0.28; text-align: center; }

    .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      margin-right: 6px;
      vertical-align: middle;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.9; }
    }
  </style>
</head>
<body class="unknown">
  <div class="card">
    <div class="status" id="status">—</div>
    <div class="hint" id="hint">loading…</div>
    <div class="temp" id="temp">—<span>°</span></div>
    <div class="temp-sub" id="temp-sub"></div>
    <div class="balance" id="balance" style="display:none">
      <div class="balance-track">
        <div class="balance-bg-cool"></div>
        <div class="balance-bg-warm"></div>
        <div class="balance-deadband" id="balance-deadband"></div>
        <div class="balance-fill" id="balance-fill"></div>
        <div class="balance-needle"></div>
        <div class="balance-ball" id="balance-ball"></div>
      </div>
      <div class="balance-labels">
        <span>← open</span>
        <span>equilibrium</span>
        <span>close →</span>
      </div>
      <div class="balance-temps" style="margin-top:6px">
        <span id="balance-indoor-label"></span>
        <span id="balance-outdoor-label"></span>
      </div>
    </div>
    <div class="forecast" id="forecast" style="display:none"></div>
    <div class="updated"><span class="dot"></span><span id="updated">checking…</span><span id="checked"></span></div>
    <button class="refresh-btn" id="refresh-btn" onclick="manualRefresh()">Refresh</button>
    <div class="chart-wrap" id="chart-wrap" style="display:none">
      <canvas id="temp-chart"></canvas>
    </div>
    <div class="wetbulb" id="wetbulb" style="display:none">
      <div class="wetbulb-head">
        <span class="wetbulb-title" id="wetbulb-title">indoor air · how survivable it feels</span>
        <span class="wetbulb-value" id="wetbulb-value">—</span>
      </div>
      <div class="wetbulb-scale">
        <div class="wetbulb-marker" id="wetbulb-marker"></div>
      </div>
      <div class="wetbulb-ticks">
        <span style="left:12%">comfortable</span>
        <span style="left:35%">muggy</span>
        <span style="left:53%">caution</span>
        <span style="left:68%">danger</span>
      </div>
      <div class="wetbulb-readout" id="wetbulb-readout"></div>
      <div class="wetbulb-forecast" id="wetbulb-forecast"></div>
      <div class="wetbulb-foot" id="wetbulb-foot"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script>
    const GIST_API = "https://api.github.com/gists/bd24c63bd7e129c86942db6ed67f9008"

    const COPY = {
      open:    { label: "OPEN",  hint: "let the air through" },
      close:   { label: "CLOSE", hint: "hold the cool in" },
      unknown: { label: "—",     hint: "waiting for data" },
    }

    function fmtHour(h) {
      if (h == null) return "?"
      if (h === 0)  return "midnight"
      if (h < 12)  return `${h}am`
      if (h === 12) return "noon"
      return `${h - 12}pm`
    }

    function timeAgo(utcString) {
      if (!utcString) return "never updated"
      const diff = Math.floor((Date.now() - new Date(utcString).getTime()) / 60000)
      if (diff < 1) return "just now"
      if (diff < 60) return `${diff} min ago`
      return `${Math.floor(diff / 60)}h ago`
    }

    let lastData = null;
    let lastChecked = null;

    async function load() {
      try {
        const res = await fetch(GIST_API)
        const gist = await res.json()
        lastData = JSON.parse(gist.files["window-watch-status.json"].content)
        lastChecked = new Date()
        updateUI()
        const csvContent = gist.files["window-watch-history.csv"]?.content
        if (csvContent) renderChart(parseCSV(csvContent), lastData)
      } catch(e) {
        document.getElementById("hint").textContent = "couldn't load data"
      }
    }

    function parseCSV(text) {
      const lines = text.trim().split('\n')
      const headers = lines[0].split(',')
      return lines.slice(1).map(line => {
        const vals = line.split(',')
        const obj = {}
        headers.forEach((h, i) => obj[h.trim()] = vals[i]?.trim())
        return obj
      }).filter(r => r.timestamp).map(r => ({
        ts: new Date(r.timestamp).getTime(),
        outdoor: parseFloat(r.outdoor_c),
        indoor: parseFloat(r.indoor_c),
        status: r.status
      })).filter(r => !isNaN(r.outdoor) && !isNaN(r.indoor))
    }

    let _chart = null

    function renderChart(rows, d) {
      const cutoff = Date.now() - 24 * 60 * 60 * 1000
      const recent = rows.filter(r => r.ts >= cutoff)
      if (recent.length < 2) return

      // build close-period bands
      const bands = []
      let bStart = null
      recent.forEach(r => {
        if (r.status === 'close' && bStart == null) bStart = r.ts
        if (r.status !== 'close' && bStart != null) { bands.push([bStart, r.ts]); bStart = null }
      })
      if (bStart != null) bands.push([bStart, recent[recent.length - 1].ts])

      const outdoorHist = recent.map(r => ({ x: r.ts, y: r.outdoor }))
      const indoorHist  = recent.map(r => ({ x: r.ts, y: r.indoor  }))

      // Extend a line forward from the model's hourly projection, bias-corrected so it
      // joins the last real reading smoothly (the raw model can sit a touch off). idx is
      // the forecast_hourly column: 1 = outdoor, 2 = modelled indoor.
      function forecastLine(idx, lastVal) {
        const out = []
        if (!d.forecast_hourly || lastVal == null) return out
        const fmap = new Map(d.forecast_hourly.map(e => [e[0], e[idx]]))
        const lastHour = new Date(recent[recent.length - 1].ts).getHours()
        const atLast = fmap.get(lastHour)
        const bias = atLast != null ? lastVal - atLast : 0
        const nowH = new Date().getHours()
        for (let i = 0; i <= 6; i++) {
          const h = (nowH + i) % 24
          const fc = fmap.get(h)
          if (fc == null) continue
          const t = new Date(); t.setHours(h, 0, 0, 0)
          if (nowH + i >= 24) t.setDate(t.getDate() + 1)
          out.push({ x: t.getTime(), y: +(fc + bias).toFixed(1) })
        }
        return out
      }
      const lastRow = recent[recent.length - 1]
      const fcPoints = forecastLine(1, d.outdoor_c != null ? lastRow.outdoor : null)
      const fcIndoor = forecastLine(2, lastRow.indoor)

      const closeBandsPlugin = {
        id: 'closeBands',
        beforeDraw(chart) {
          const { ctx, chartArea: { top, bottom }, scales: { x } } = chart
          ctx.save()
          ctx.fillStyle = 'rgba(180, 50, 50, 0.18)'
          bands.forEach(([s, e]) => {
            const px0 = x.getPixelForValue(s)
            const px1 = x.getPixelForValue(e)
            ctx.fillRect(px0, top, px1 - px0, bottom - top)
          })
          ctx.restore()
        }
      }

      const wrap = document.getElementById('chart-wrap')
      wrap.style.display = ''
      if (_chart) { _chart.destroy(); _chart = null }

      _chart = new Chart(document.getElementById('temp-chart'), {
        type: 'line',
        plugins: [closeBandsPlugin],
        data: {
          datasets: [
            {
              label: 'Outdoor',
              data: outdoorHist,
              borderColor: '#ff8c8c',
              borderWidth: 2,
              pointRadius: 0,
              tension: 0.3,
              fill: false,
            },
            {
              label: 'Outdoor →',
              data: fcPoints,
              borderColor: 'rgba(255,140,140,0.5)',
              borderWidth: 1.5,
              borderDash: [4, 3],
              pointRadius: 0,
              tension: 0.3,
              fill: false,
            },
            {
              label: 'Indoor',
              data: indoorHist,
              borderColor: '#4db6ff',
              borderWidth: 2,
              pointRadius: 0,
              tension: 0.3,
              fill: false,
            },
            {
              label: 'Indoor →',
              data: fcIndoor,
              borderColor: 'rgba(77,182,255,0.5)',
              borderWidth: 1.5,
              borderDash: [4, 3],
              pointRadius: 0,
              tension: 0.3,
              fill: false,
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          interaction: { mode: 'index', intersect: false },
          scales: {
            x: {
              type: 'linear',
              ticks: {
                color: 'rgba(255,255,255,0.3)',
                maxRotation: 0,
                maxTicksLimit: 6,
                callback(v) {
                  const dt = new Date(v), h = dt.getHours()
                  if (h === 0) return 'midnight'
                  if (h === 12) return 'noon'
                  return h < 12 ? `${h}am` : `${h-12}pm`
                }
              },
              grid: { color: 'rgba(255,255,255,0.05)' },
              border: { display: false }
            },
            y: {
              ticks: {
                color: 'rgba(255,255,255,0.3)',
                maxTicksLimit: 4,
                callback: v => `${v}°`
              },
              grid: { color: 'rgba(255,255,255,0.05)' },
              border: { display: false }
            }
          },
          plugins: {
            legend: {
              display: true,
              labels: {
                color: 'rgba(255,255,255,0.35)',
                boxWidth: 24,
                boxHeight: 2,
                font: { size: 11 },
                padding: 12
              }
            },
            tooltip: { enabled: false }
          }
        }
      })
    }

    const HYSTERESIS = 1.0  // reopen band — must match Python default
    const CLOSE_LEAD = 0.5  // anticipatory close margin — must match Python default

    // Wet-bulb thresholds (°C). 28° is where prolonged indoor exposure turns
    // dangerous; 35° is the theoretical survivability limit.
    const WB_DANGER = 28
    const WB_MIN = 18, WB_MAX = 35   // gauge scale bounds

    // Stull (2011) approximation — accurate to ~±0.65°C for typical indoor RH.
    function wetBulb(T, RH) {
      if (T == null || RH == null) return null
      RH = Math.max(1, Math.min(100, RH))
      return T * Math.atan(0.151977 * Math.sqrt(RH + 8.313659))
        + Math.atan(T + RH) - Math.atan(RH - 1.676331)
        + 0.00391838 * Math.pow(RH, 1.5) * Math.atan(0.023101 * RH)
        - 4.686035
    }

    function wbPct(wb) {
      return Math.max(0, Math.min(100, (wb - WB_MIN) / (WB_MAX - WB_MIN) * 100))
    }

    // Translate wet-bulb into a 0–100 comfort score — easier to read at a glance
    // than a °C value sitting next to the air temperatures. 100% = fresh (≤18°),
    // 0% = the 28° danger line; beyond that it's pinned at 0 and the readout alerts.
    function comfortPct(wb) {
      return Math.round(Math.max(0, Math.min(100, (WB_DANGER - wb) / (WB_DANGER - WB_MIN) * 100)))
    }

    // [word, colour] for the band the air is currently in.
    function comfortBand(wb) {
      if (wb < 22) return ["comfortable", "#7fd1ff"]
      if (wb < 26) return ["muggy",       "#e0c34a"]
      if (wb < 28) return ["caution",     "#e08a3c"]
      if (wb < 31) return ["danger",      "#e0584a"]
      return ["extreme", "#ff8c8c"]
    }

    function liveTemps(d) {
      // Outdoor ticks between refreshes by following the forecast *trend*, but it's
      // bias-corrected to the last real observed reading (outdoor_c) so it agrees
      // exactly with the value the decision/notification used at refresh time — the
      // raw forecast can run several degrees off. Indoor is always the real sensor.
      if (d.forecast_hourly && d.outdoor_c != null && d.updated_utc) {
        const fmap = new Map(d.forecast_hourly.map(e => [e[0], e[1]]))
        const updHour = new Date(d.updated_utc).getHours()
        const nowHour = new Date().getHours()
        const fcNow = fmap.get(nowHour), fcUpd = fmap.get(updHour)
        if (fcNow != null && fcUpd != null) {
          // observed + (how much the forecast says it's moved since the last refresh)
          return { outdoor: d.outdoor_c + (fcNow - fcUpd), indoor: d.indoor_est_c, isForecast: nowHour !== updHour }
        }
      }
      return { outdoor: d.outdoor_c, indoor: d.indoor_est_c, isForecast: false }
    }

    function updateUI() {
      if (!lastData) return
      const d = lastData
      const { outdoor, indoor, isForecast } = liveTemps(d)

      // Re-derive status from live temps so the display stays current between runs.
      // Asymmetric: close at the crossover (don't wait — late closing traps heat),
      // reopen only once genuinely cooler. In between, hold the server's decision.
      let s = d.status || "unknown"
      if (outdoor != null && indoor != null) {
        if (outdoor >= indoor)                   s = "close"
        else if (outdoor <= indoor - HYSTERESIS) s = "open"
      }
      const copy = COPY[s] || COPY.unknown

      document.body.className = s
      document.getElementById("status").textContent = copy.label
      document.getElementById("hint").textContent = copy.hint
      // Hero is the indoor↔outdoor gap — the number that actually drives the
      // open/close call — not the raw outdoor temperature.
      const tEl = document.getElementById("temp")
      const subEl = document.getElementById("temp-sub")
      if (outdoor != null && indoor != null) {
        const d0 = outdoor - indoor
        const sign = d0 >= 0 ? "+" : "−"
        tEl.innerHTML = `${isForecast ? "~" : ""}${sign}${Math.abs(d0).toFixed(1)}<span>°</span>`
        subEl.textContent =
          d0 >= 0 ? "warmer outside than in" :
          d0 <= -HYSTERESIS ? "cooler outside than in" :
          "barely cooler outside"
      } else {
        tEl.innerHTML = `—<span>°</span>`
        subEl.textContent = ""
      }
      const balance = document.getElementById("balance")
      if (outdoor != null && indoor != null) {
        balance.style.display = ""
        const RANGE = 8
        const delta = outdoor - indoor
        const pct = Math.min(95, Math.max(5, 50 + (delta / RANGE) * 50))
        // Hold zone sits between the reopen point (indoor - HYSTERESIS) and the
        // crossover (indoor, at centre) — to the right of centre means close.
        const deadPct = (HYSTERESIS / RANGE) * 50
        document.getElementById("balance-deadband").style.left = (50 - deadPct) + "%"
        document.getElementById("balance-deadband").style.width = deadPct + "%"
        const ball = document.getElementById("balance-ball")
        const fill = document.getElementById("balance-fill")
        ball.style.left = pct + "%"
        if (delta >= 0) {
          fill.style.left = "50%"; fill.style.width = (pct - 50) + "%"
          fill.style.background = "rgba(255,120,100,0.55)"; ball.style.background = "#ff8c8c"
        } else if (delta <= -HYSTERESIS) {
          fill.style.left = pct + "%"; fill.style.width = (50 - pct) + "%"
          fill.style.background = "rgba(77,182,255,0.55)"; ball.style.background = "#4db6ff"
        } else {
          fill.style.width = "0%"; ball.style.background = "rgba(255,255,255,0.65)"
        }
        document.getElementById("balance-indoor-label").textContent = `${isForecast ? "~" : ""}${indoor.toFixed(1)}°C inside`
        document.getElementById("balance-outdoor-label").textContent = `${isForecast ? "~" : ""}${outdoor.toFixed(1)}°C outside`
      } else {
        balance.style.display = "none"
      }

      // Wet-bulb gauge — needs real indoor temp + humidity from the Shelly.
      const wb = wetBulb(d.indoor_est_c, d.indoor_humidity_pct)
      const wbBox = document.getElementById("wetbulb")
      if (wb != null) {
        const est = !!d.indoor_estimated   // sensor offline → modelled temp + RH
        const pct = comfortPct(wb)
        const [word, colour] = comfortBand(wb)
        wbBox.style.display = ""
        document.getElementById("wetbulb-title").textContent =
          `indoor air at ${est ? "~" : ""}${d.indoor_est_c.toFixed(1)}°C`
        const val = document.getElementById("wetbulb-value")
        val.innerHTML = `${pct}% <span>· ${word}</span>`
        val.style.color = colour
        document.getElementById("wetbulb-marker").style.left = wbPct(wb) + "%"

        const readout = document.getElementById("wetbulb-readout")
        if (wb < 22) {
          readout.className = "wetbulb-readout"
          readout.textContent = "Air feels fresh — no heat stress"
        } else if (wb < 26) {
          readout.className = "wetbulb-readout"
          readout.textContent = "Muggy but safe — ventilate when you can"
        } else if (wb < 28) {
          readout.className = "wetbulb-readout"
          readout.textContent = "Getting oppressive — prioritise airflow and water"
        } else {
          readout.className = "wetbulb-readout alert"
          readout.textContent = "⚠ Heat-stress danger — ventilate, hydrate, avoid exertion"
        }

        // Today's projected peak — "how balmy will it get" from the engine.
        const fcEl = document.getElementById("wetbulb-forecast")
        if (d.wetbulb_max_c != null && d.wetbulb_peak_hour != null) {
          const mPct = comfortPct(d.wetbulb_max_c)
          const [mWord] = comfortBand(d.wetbulb_max_c)
          fcEl.style.display = ""
          fcEl.innerHTML = `Today's muggiest: <strong>${mPct}% · ${mWord}</strong> around ${fmtHour(d.wetbulb_peak_hour)}`
        } else {
          fcEl.style.display = "none"
        }

        // Keep the raw wet-bulb available, but demoted to a small technical footnote
        // so it doesn't read as just another room temperature.
        document.getElementById("wetbulb-foot").textContent =
          `${est ? "estimated " : ""}wet-bulb ${wb.toFixed(1)}°C`
      } else {
        wbBox.style.display = "none"
      }

      // Forecast block. The close time is frozen once it's passed (server-side),
      // so during the close period we show it as a "closed since" reference rather
      // than hiding it; reopen stays as the upcoming target.
      const fc = document.getElementById("forecast")
      const nowHour = new Date().getHours()
      const cH = d.forecast_close_hour, oH = d.forecast_open_hour
      const closeUpcoming = cH != null && cH >= nowHour
      const openUpcoming = oH != null && oH >= nowHour
      const peakLine = d.forecast_max_c != null && d.forecast_peak_hour != null
        ? `<div class="forecast-peak">Today peaks at ${d.forecast_max_c.toFixed(0)}°C around ${fmtHour(d.forecast_peak_hour)}</div>`
        : ""

      if (s === "close") {
        fc.style.display = ""
        fc.className = "forecast warn"
        let html = cH == null ? `Keep the windows shut`
          : closeUpcoming ? `Close before <strong>${fmtHour(cH)}</strong>`
          : `Closed since <strong>${fmtHour(cH)}</strong>`
        html += oH != null
          ? ` · open around <strong>${fmtHour(oH)}</strong>`
          : ` · may stay hot overnight`
        fc.innerHTML = html + peakLine
      } else if (closeUpcoming) {
        fc.style.display = ""
        fc.className = "forecast warn"
        let html = `Close before <strong>${fmtHour(cH)}</strong>`
        if (oH != null) html += ` · open around <strong>${fmtHour(oH)}</strong>`
        fc.innerHTML = html + peakLine
      } else if (openUpcoming) {
        fc.style.display = ""
        fc.className = "forecast"
        fc.innerHTML = `Open around <strong>${fmtHour(oH)}</strong>` + peakLine
      } else {
        fc.style.display = "none"
      }

      document.getElementById("updated").textContent = "data " + timeAgo(d.updated_utc)
      if (lastChecked) {
        const checkedDiff = Math.floor((Date.now() - lastChecked.getTime()) / 60000)
        const checkedStr = checkedDiff < 1 ? "checked just now" : `checked ${checkedDiff}m ago`
        document.getElementById("checked").textContent = "· " + checkedStr
      }
    }

    async function manualRefresh() {
      const btn = document.getElementById("refresh-btn")
      btn.disabled = true
      btn.textContent = "Refreshing…"
      document.getElementById("checked").textContent = ""

      // Ask the Fly runner to do a full refresh (both weather API + Shelly)
      try {
        await fetch("https://window-watch-ollie.fly.dev/refresh", {
          method: "POST",
          headers: { "Authorization": "Bearer yKkEP4_tiXaXMUh9AR-fkALJjHNHtK6D" },
        })
        // Give the runner a moment to fetch APIs and write the Gist
        await new Promise(r => setTimeout(r, 4000))
      } catch (_) { /* fall through to re-read existing Gist */ }

      await load()
      btn.textContent = "Refresh"
      btn.disabled = false
    }

    load()
    // Fetch new data every 10 minutes
    setInterval(load, 10 * 60 * 1000)
    // Update the "time ago" string every 60 seconds
    setInterval(updateUI, 60000)
  </script>
</body>
</html>
